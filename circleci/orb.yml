# WDX CircleCI Orb Definition
# Published at: wdx-dev/wdx on CircleCI Orb Registry

version: 2.1

description: >
  Bootstrap a WordPress instance and apply WDX configuration.
  https://wordpressdx.dev

display:
  home_url: https://wordpressdx.dev
  source_url: https://github.com/wdx-dev/action

executors:
  default:
    docker:
      - image: cimg/node:20.0

commands:
  setup:
    description: Bootstrap WordPress and apply WDX config
    parameters:
      wp-version:
        type: string
        default: "latest"
      wp-port:
        type: integer
        default: 8080
      token:
        type: env_var_name
        default: WDX_TOKEN
    steps:
      - run:
          name: Start WordPress stack
          command: |
            cat > /tmp/wdx-compose.yml << EOF
            services:
              mysql:
                image: mysql:8.0
                environment:
                  MYSQL_ROOT_PASSWORD: wdx
                  MYSQL_DATABASE: wordpress
                healthcheck:
                  test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
                  interval: 5s
                  timeout: 5s
                  retries: 12
              wordpress:
                image: wordpress:<< parameters.wp-version >>
                depends_on:
                  mysql:
                    condition: service_healthy
                environment:
                  WORDPRESS_DB_HOST: mysql
                  WORDPRESS_DB_NAME: wordpress
                  WORDPRESS_DB_USER: root
                  WORDPRESS_DB_PASSWORD: wdx
                ports:
                  - "<< parameters.wp-port >>:80"
            EOF
            docker compose -f /tmp/wdx-compose.yml up -d
      - run:
          name: Wait for WordPress
          command: |
            timeout 90 bash -c \
              'until curl -so /dev/null --connect-timeout 5 http://localhost:<< parameters.wp-port >>/; do sleep 3; done'
      - run:
          name: Install WordPress
          command: |
            CONTAINER=$(docker compose -f /tmp/wdx-compose.yml ps -q wordpress)
            docker exec "$CONTAINER" bash -c "
              curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
              chmod +x wp-cli.phar && mv wp-cli.phar /usr/local/bin/wp
            "
            docker exec "$CONTAINER" wp core install \
              --url="http://localhost" --title="WDX CI" \
              --admin_user="admin" --admin_password="admin" \
              --admin_email="ci@wdx.dev" --skip-email --allow-root
            docker exec "$CONTAINER" wp option update siteurl "http://localhost:<< parameters.wp-port >>" --allow-root
            docker exec "$CONTAINER" wp option update home "http://localhost:<< parameters.wp-port >>" --allow-root
            APP_PASS=$(docker exec "$CONTAINER" wp user application-password create admin "WDX CI" \
              --porcelain --allow-root)
            mkdir -p ~/.wdx
            printf '{"sites":[{"id":"ci","url":"http://localhost:<< parameters.wp-port >>","username":"admin","app_password":"%s"}]}\n' \
              "$APP_PASS" > ~/.wdx/sites.json
      - run:
          name: Install WDX CLI
          command: npm install -g wdx
      - run:
          name: Push WDX config
          command: wdx push

  deploy:
    description: Deploy WDX config to a real WordPress site
    parameters:
      site:
        type: string
        default: "staging"
      token:
        type: env_var_name
        default: WDX_TOKEN
    steps:
      - run:
          name: Install WDX CLI
          command: npm install -g wdx
      - run:
          name: Push WDX config
          command: wdx push --site << parameters.site >>
      - run:
          name: Verify deploy
          command: wdx diff --site << parameters.site >>

jobs:
  test:
    executor: default
    parameters:
      wp-version:
        type: string
        default: "latest"
    steps:
      - checkout
      - setup_remote_docker
      - setup:
          wp-version: << parameters.wp-version >>

  deploy:
    executor: default
    parameters:
      site:
        type: string
        default: "staging"
    steps:
      - checkout
      - deploy:
          site: << parameters.site >>
