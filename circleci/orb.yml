# Loopress CircleCI Orb Definition
# Published at: loopress-dev/loopress on CircleCI Orb Registry

version: 2.1

description: >
  Bootstrap a WordPress instance and apply Loopress configuration.
  https://loopress.dev

display:
  home_url: https://loopress.dev
  source_url: https://github.com/loopress/setup-ci

executors:
  default:
    docker:
      - image: cimg/node:20.0

commands:
  setup:
    description: Bootstrap WordPress and apply Loopress config
    parameters:
      wp-version:
        type: string
        default: "latest"
      wp-port:
        type: integer
        default: 8080
      token:
        type: env_var_name
        default: LOOPRESS_TOKEN
    steps:
      - run:
          name: Download Loopress scripts
          command: |
            BASE_URL="https://raw.githubusercontent.com/loopress/setup-ci/v1"
            curl -fsSL "$BASE_URL/docker/compose.yml" -o /tmp/loopress-compose.yml
            curl -fsSL "$BASE_URL/scripts/start-wordpress.sh" -o /tmp/loopress-start.sh
            curl -fsSL "$BASE_URL/scripts/setup-wordpress.sh" -o /tmp/loopress-setup.sh
            curl -fsSL "$BASE_URL/scripts/setup-loopress.sh" -o /tmp/loopress-cli.sh
            chmod +x /tmp/loopress-start.sh /tmp/loopress-setup.sh /tmp/loopress-cli.sh
      - run:
          name: Start WordPress stack
          environment:
            LOOPRESS_WP_VERSION: << parameters.wp-version >>
            LOOPRESS_WP_PORT: << parameters.wp-port >>
          command: /tmp/loopress-start.sh
      - run:
          name: Install WordPress
          environment:
            LOOPRESS_WP_PORT: << parameters.wp-port >>
          command: /tmp/loopress-setup.sh
      - run:
          name: Install Loopress CLI
          command: /tmp/loopress-cli.sh

  deploy:
    description: Deploy Loopress config to a real WordPress site
    parameters:
      site:
        type: string
        default: "staging"
      token:
        type: env_var_name
        default: LOOPRESS_TOKEN
    steps:
      - run:
          name: Install Loopress CLI
          command: npm install -g @loopress/cli
      - run:
          name: Push Loopress config
          command: loopress push --site << parameters.site >>
      - run:
          name: Verify deploy
          command: loopress diff --site << parameters.site >>

jobs:
  test:
    executor: default
    parameters:
      wp-version:
        type: string
        default: "latest"
    steps:
      - checkout
      - setup_remote_docker
      - setup:
          wp-version: << parameters.wp-version >>

  deploy:
    executor: default
    parameters:
      site:
        type: string
        default: "staging"
    steps:
      - checkout
      - deploy:
          site: << parameters.site >>
