# Loopress GitLab CI Template
# Hosted by Loopress — do not copy, reference via remote include

.loopress-bootstrap:
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    LOOPRESS_WP_VERSION: "latest"
    LOOPRESS_WP_PORT: "8080"
  before_script:
    - apk add --no-cache bash curl nodejs npm
    - |
      BASE_URL="https://raw.githubusercontent.com/loopress/setup-ci/v1"
      curl -fsSL "$BASE_URL/docker/compose.yml" -o /tmp/loopress-compose.yml
      curl -fsSL "$BASE_URL/scripts/start-wordpress.sh" -o /tmp/loopress-start.sh
      curl -fsSL "$BASE_URL/scripts/setup-wordpress.sh" -o /tmp/loopress-setup.sh
      curl -fsSL "$BASE_URL/scripts/setup-loopress.sh" -o /tmp/loopress-cli.sh
      chmod +x /tmp/loopress-start.sh /tmp/loopress-setup.sh /tmp/loopress-cli.sh
    - /tmp/loopress-start.sh
    - /tmp/loopress-setup.sh
    - /tmp/loopress-cli.sh

.loopress-test:
  extends: .loopress-bootstrap
  script:
    - loopress push
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

.loopress-deploy:
  image: node:20-alpine
  variables:
    LOOPRESS_SITE: "staging"
  before_script:
    - npm install -g @loopress/cli
  script:
    - loopress push --site $LOOPRESS_SITE
    - loopress diff --site $LOOPRESS_SITE
