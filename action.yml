name: "LPS Setup"
description: "Bootstrap a WordPress instance and apply LPS configuration"

branding:
  icon: "zap"
  color: "blue"

inputs:
  token:
    description: "LPS cloud token (not required for CI testing — only needed for deploying to real sites)"
    required: false
  wp-version:
    description: "WordPress version"
    default: "latest"
  site-id:
    description: "LPS site ID"
    default: "ci"
  port:
    description: "WordPress port on the runner"
    default: "8080"

outputs:
  wp-url:
    description: "WordPress URL"
    value: ${{ steps.info.outputs.wp-url }}

runs:
  using: "composite"
  steps:
    - name: Start WordPress stack
      shell: bash
      run: |
        cat > /tmp/lps-compose.yml << EOF
        services:
          mysql:
            image: mysql:8.0
            environment:
              MYSQL_ROOT_PASSWORD: lps
              MYSQL_DATABASE: wordpress
            healthcheck:
              test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
              interval: 5s
              timeout: 5s
              retries: 12

          wordpress:
            image: wordpress:${{ inputs.wp-version }}
            depends_on:
              mysql:
                condition: service_healthy
            environment:
              WORDPRESS_DB_HOST: mysql
              WORDPRESS_DB_NAME: wordpress
              WORDPRESS_DB_USER: root
              WORDPRESS_DB_PASSWORD: lps
            ports:
              - "${{ inputs.port }}:80"
        EOF

        docker compose -f /tmp/lps-compose.yml up -d

    - name: Wait for WordPress
      shell: bash
      run: |
        echo "Waiting for WordPress to be reachable..."
        timeout 90 bash -c \
          'until curl -so /dev/null --connect-timeout 5 http://localhost:${{ inputs.port }}/; do sleep 3; done'
        echo "WordPress is ready"

    - name: Install WP-CLI in container
      shell: bash
      run: |
        CONTAINER=$(docker compose -f /tmp/lps-compose.yml ps -q wordpress)
        docker exec "$CONTAINER" bash -c "
          curl -sO https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
          chmod +x wp-cli.phar && mv wp-cli.phar /usr/local/bin/wp
        "

    - name: Install WordPress
      shell: bash
      run: |
        CONTAINER=$(docker compose -f /tmp/lps-compose.yml ps -q wordpress)
        # WP-CLI uses the internal port (80) to avoid HTTP requests failing
        # from inside the container where the external port is not accessible.
        # LPS communicates via the external port stored in sites.json.
        docker exec "$CONTAINER" wp core install \
          --url="http://localhost" \
          --title="LPS CI" \
          --admin_user="admin" \
          --admin_password="admin" \
          --admin_email="ci@lps.dev" \
          --skip-email \
          --allow-root
        # Update siteurl/home to the external URL for LPS REST API calls
        docker exec "$CONTAINER" wp option update siteurl "http://localhost:${{ inputs.port }}" --allow-root
        docker exec "$CONTAINER" wp option update home "http://localhost:${{ inputs.port }}" --allow-root

    - name: Create Application Password
      id: app-password
      shell: bash
      run: |
        CONTAINER=$(docker compose -f /tmp/lps-compose.yml ps -q wordpress)
        APP_PASS=$(docker exec "$CONTAINER" wp user application-password create admin "LPS CI" \
          --porcelain \
          --allow-root)
        echo "value=$APP_PASS" >> $GITHUB_OUTPUT

    - name: Set outputs
      id: info
      shell: bash
      run: echo "wp-url=http://localhost:${{ inputs.port }}" >> $GITHUB_OUTPUT

    - name: Configure LPS
      shell: bash
      run: |
        mkdir -p ~/.lps
        printf '{"sites":[{"id":"%s","url":"http://localhost:%s","username":"admin","app_password":"%s"}]}\n' \
          "${{ inputs.site-id }}" \
          "${{ inputs.port }}" \
          "${{ steps.app-password.outputs.value }}" \
          > ~/.lps/sites.json

    - name: Warn if CI token missing
      shell: bash
      if: ${{ !inputs.token }}
      run: |
        echo "::warning::No LPS token provided."
        echo "::warning::CI testing is free and unlimited — but deploying to real sites requires a token."
        echo "::warning::Get your free token at https://loopress.dev/token"

    - name: Install LPS CLI
      shell: bash
      run: npm install -g lps
