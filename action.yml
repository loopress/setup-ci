name: "Loopress Setup"
description: "Bootstrap a WordPress instance and apply Loopress configuration"

branding:
  icon: "zap"
  color: "blue"

inputs:
  token:
    description: "Loopress cloud token (not required for CI testing — only needed for deploying to real sites)"
    required: false
  wp-version:
    description: "WordPress version"
    default: "latest"
  site-id:
    description: "Loopress site ID"
    default: "ci"
  port:
    description: "WordPress port on the runner"
    default: "8080"

outputs:
  wp-url:
    description: "WordPress URL"
    value: ${{ steps.info.outputs.wp-url }}

runs:
  using: "composite"
  steps:
    - name: Start WordPress stack
      shell: bash
      env:
        LOOPRESS_WP_VERSION: ${{ inputs.wp-version }}
        LOOPRESS_WP_PORT: ${{ inputs.port }}
        LOOPRESS_COMPOSE_FILE: ${{ github.action_path }}/docker/compose.yml
      run: bash $GITHUB_ACTION_PATH/scripts/start-wordpress.sh

    - name: Install WordPress
      shell: bash
      env:
        LOOPRESS_WP_PORT: ${{ inputs.port }}
        LOOPRESS_SITE_ID: ${{ inputs.site-id }}
        LOOPRESS_COMPOSE_FILE: ${{ github.action_path }}/docker/compose.yml
      run: bash $GITHUB_ACTION_PATH/scripts/setup-wordpress.sh

    - name: Set outputs
      id: info
      shell: bash
      run: echo "wp-url=http://localhost:${{ inputs.port }}" >> $GITHUB_OUTPUT

    - name: Warn if token missing
      shell: bash
      if: ${{ !inputs.token }}
      run: |
        echo "::warning::No Loopress token provided."
        echo "::warning::CI testing is free and unlimited — but deploying to real sites requires a token."
        echo "::warning::Get your free token at https://loopress.dev/token"

    - name: Install Loopress CLI
      shell: bash
      run: bash $GITHUB_ACTION_PATH/scripts/setup-loopress.sh
